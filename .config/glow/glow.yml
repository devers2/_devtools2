# ==============================================================================
# Glow Configuration (glow.yml)
# 터미널 마크다운 뷰어 Glow의 동작을 제어하는 설정 파일입니다.
# ==============================================================================

# 🎨 스타일 관련 설정
# ------------------------------------------------------------------------------
# style: 마크다운 렌더링에 사용할 테마를 지정합니다.
# - "auto": 터미널 배경색에 맞춰 자동으로 선택 (기본값)
# - "dark" / "light": 명시적으로 어두운/밝은 테마 사용
# - "/path/to/theme.json": 직접 만든 커스텀 JSON 스타일 파일 경로 지정 가능
style: "auto"

# 🖱️ 사용자 인터페이스(UI) 설정
# ------------------------------------------------------------------------------
# mouse: TUI(탐색기 모드)에서 마우스 클릭 및 휠 스크롤 지원 여부
mouse: true

# pager: 내용이 터미널 화면보다 길 때 'less' 같은 페이저로 출력할지 여부
# - false: 터미널 본문에 바로 출력 (스크롤은 터미널 기능을 이용)
# - true: 별도의 페이저 모드로 진입
pager: false

# width: 텍스트가 줄바꿈(Word-wrap)될 너비를 지정 (단위: 문자 수)
# 너무 넓으면 읽기 불편하므로 보통 80~120 사이를 권장합니다.
width: 120

# 📂 탐색기(CLI 모드) 설정
# ------------------------------------------------------------------------------
# all: 파일 경로 없이 'glow' 명령만 입력했을 때 나타나는 탐색기 설정
# - true: 숨김 파일(.) 및 .gitignore에 등록된 파일까지 모두 표시
# - false: 일반적인 마크다운 파일만 깔끔하게 표시
all: false

# 🛠️ 일반적인 추가 옵션 (자주 쓰이는 것들)
# ------------------------------------------------------------------------------
# local: 로컬 파일만 검색할지 여부 (Glow 클라우드/서버 기능 제외)
local: true

# comment: 마크다운 내의 주석()을 렌더링할지 여부
# comment: false
