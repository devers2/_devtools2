# DevTools2 도구 버전 이력 (tool-versions.toml)
#
# 형상관리: 이 파일은 설치 스크립트와 함께 Git으로 관리됩니다.
#
# ─── 규칙 ────────────────────────────────────────────────────────────────────
#  • 각 배열의 첫 번째 항목이 "최종 설치 버전"(기본 설치 버전)입니다.
#  • 최신 버전으로 설치 성공 시, 해당 버전이 자동으로 배열 앞에 추가됩니다.
#  • 문제가 발생한 버전은 배열에서 해당 항목만 삭제하면 이전 버전으로 롤백됩니다.
#
# ─── 예시 ─────────────────────────────────────────────────────────────────────
#  nodejs = ["v24.16.0", "v24.15.0"]
#  → 최종 설치 버전 선택 시 "v24.16.0"(첫 번째 항목)이 설치됩니다.
# ──────────────────────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────────────────────
# 2.install-core-tools.sh 관리 도구
# ──────────────────────────────────────────────────────────────────────────────
[core_tools]

# Node.js LTS (v24.x) — 버전은 'v' 포함 (예: "v24.15.0")
nodejs = ["v24.18.0", "v24.15.0"]

# Ghostty Terminal AppImage (pkgforge-dev 빌드) — 버전은 'v' 미포함 (예: "1.3.1")
ghostty = ["1.3.1"]

# ──────────────────────────────────────────────────────────────────────────────
# 3.install-cli-tools.sh 관리 도구
# ──────────────────────────────────────────────────────────────────────────────
[cli_tools]

# fzf (터미널 퍼지 파인더) — 버전은 'v' 미포함 (예: "0.71.0")
fzf = ["0.74.1", "0.71.0"]

# lazygit (TUI Git 클라이언트) — 버전은 'v' 미포함 (예: "0.61.1")
lazygit = ["0.63.1", "0.61.1"]

# ripgrep / rg (초고속 코드 검색) — 버전은 'v' 미포함 (예: "15.1.0")
ripgrep = ["15.2.0", "15.1.0"]

# fd-find / fd (초고속 파일 검색) — 버전은 'v' 미포함 (예: "10.4.2")
fd = ["10.4.2"]

# ast-grep / sg (AST 기반 코드 검색) — 버전은 'v' 미포함 (예: "0.42.1")
ast_grep = ["0.44.1", "0.42.1"]

# Bitwarden CLI / bw [ARM64 전용 버전 관리]
# x86_64는 공식 직접 다운로드 URL(항상 최신)을 사용하므로 버전 관리 불필요.
# 형식: "YYYY.M.P" (예: "2024.4.1")
bitwarden_arm = ["2024.4.1"]

# win32yank (WSL2 클립보드 연동, WSL2 전용) — 버전은 'v' 미포함 (예: "0.1.1")
win32yank = ["0.1.1"]
